[graph]
all-features = true
targets = ["x86_64-pc-windows-msvc"]

[advisories]
version = 2
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2025-0075", reason = "Transitive via Tauri urlpattern/unic; no safe upstream upgrade is available. Desktop v1 treats this as tracked advisory risk." },
  { id = "RUSTSEC-2025-0080", reason = "Transitive via Tauri urlpattern/unic; no safe upstream upgrade is available. Desktop v1 treats this as tracked advisory risk." },
  { id = "RUSTSEC-2025-0081", reason = "Transitive via Tauri urlpattern/unic; no safe upstream upgrade is available. Desktop v1 treats this as tracked advisory risk." },
  { id = "RUSTSEC-2025-0098", reason = "Transitive via Tauri urlpattern/unic; no safe upstream upgrade is available. Desktop v1 treats this as tracked advisory risk." },
  { id = "RUSTSEC-2025-0100", reason = "Transitive via Tauri urlpattern/unic; no safe upstream upgrade is available. Desktop v1 treats this as tracked advisory risk." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
  "Apache-2.0 WITH LLVM-exception",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
