# Copy this file to wallets.toml and fill in your real addresses.
# wallets.toml is gitignored — client wallet addresses never belong in git.

[project]
name = "example-project"
base_currency = "GBP"
period_start = "2017-01-01T00:00:00Z"
period_end = "2025-04-05T23:59:59Z"

[[wallets]]
id = "near_main"
name = "NEAR wallet"
chain = "near"
address = "example.near"
provider = "nearblocks"

[[wallets]]
id = "lisk_main"
name = "Lisk EVM wallet"
chain = "lisk-evm"
address = "0xPUT_ADDRESS_HERE"
provider = "lisk_blockscout"

[[wallets]]
id = "iota_main"
name = "IOTA EVM wallet"
chain = "iota-evm"
address = "0xPUT_ADDRESS_HERE"
provider = "iota_blockscout"

# CEX CSV exports to import (optional). Keep the original files unedited —
# HMRC requests full, unedited trading data files, so tinotax stores an
# immutable hashed copy of each under raw/cex/<id>/.
#
# [[cex_csvs]]
# id = "binance_2017_2025"
# platform = "binance"          # binance | coinbase | kraken | awaken | generic
# path = "./imports/binance.csv"
#
# [[cex_csvs]]
# id = "myexchange_2020"
# platform = "generic"
# path = "./imports/myexchange.csv"
# # For platform = "generic", map your CSV's column names onto the canonical
# # ones: timestamp, type, asset, amount (signed), fee_asset, fee_amount, note.
# [cex_csvs.mapping]
# timestamp = "Date"
# type = "Operation"
# asset = "Coin"
# amount = "Change"

[providers.lisk_blockscout]
kind = "blockscout"
base_url = "https://blockscout.lisk.com/api/v2"

[providers.iota_blockscout]
kind = "blockscout"
base_url = "https://explorer.evm.iota.org/api/v2"

[providers.nearblocks]
kind = "nearblocks"
base_url = "https://api.nearblocks.io/v1"
